<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active Remote Desktop Session</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF5722',
              dark: '#0A0A0A',
              surface: '#1A1A1A',
            }
          },
          backdropBlur: {
            xs: '2px',
          }
        }
      }
    }
  </script>
<!-- Custom Styling for Specific UI Elements -->
<style data-purpose="custom-layout-styles">
    body {
      background-color: #0A0A0A;
      color: #E0E0E0;
      overflow: hidden; /* Prevent scrolling for immersive feel */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Glassmorphism Effect for the Control Bar */
    .glass-panel {
      background: rgba(30, 30, 30, 0.6);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Pulse animation for the Live indicator */
    @keyframes pulse-orange {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    .status-pulse {
      animation: pulse-orange 2s infinite ease-in-out;
    }

    /* Gradient overlay for the remote screen to simulate depth */
    .screen-overlay {
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.2) 100%);
      pointer-events: none;
    }
  </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between items-center relative">
<!-- BEGIN: Top StatusBar -->
<header class="w-full h-12 flex items-center justify-between px-6 bg-brand-dark/80 z-20" data-purpose="session-status-bar">
<div class="flex items-center gap-3">
<!-- Live Indicator -->
<div class="flex items-center gap-2 px-3 py-1 bg-brand-orange/10 border border-brand-orange/30 rounded-full">
<span class="w-2 h-2 bg-brand-orange rounded-full status-pulse"></span>
<span class="text-[10px] font-bold uppercase tracking-widest text-brand-orange">Live</span>
</div>
<span class="text-xs font-medium text-gray-400">Connected: <span class="text-white">Workstation-01</span></span>
</div>
<div class="flex items-center gap-4">
<!-- Latency/Signal UI -->
<div class="flex gap-0.5 items-end h-3">
<div class="w-1 h-1.5 bg-brand-orange rounded-sm"></div>
<div class="w-1 h-2 bg-brand-orange rounded-sm"></div>
<div class="w-1 h-2.5 bg-brand-orange rounded-sm"></div>
<div class="w-1 h-3 bg-brand-orange rounded-sm"></div>
</div>
<span class="text-[10px] text-gray-500 font-mono tracking-tighter">14ms</span>
</div>
</header>
<!-- END: Top StatusBar -->
<!-- BEGIN: Main Remote Viewport -->
<main class="flex-grow w-full flex items-center justify-center p-4 bg-black" data-purpose="remote-desktop-container">
<div class="relative w-full aspect-video max-w-6xl rounded-lg overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)] border border-white/5">
<!-- Remote Desktop Content (Placeholder Image) -->
<img alt="Remote Desktop" class="w-full h-full object-cover" data-purpose="remote-screen-feed" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3ZtLiAuJQD2XQhWE9kKY5WW96a4D9-qpLPuXFYHWrg_a85iEZwXRI2ebUhrEAkmPE7VxZONIMDrzvPJJLpi0iTH9ngqLoK3MRB3YIli3gNeXZkpK4FbGbpmWQxfK0JqOBapcktX-KG92eEV-kY0eTqsOqi1NvcuO_-9SJSrPB6X4mOSFaca6kUlaFULOjvjaftUG-k3iASSpMmOOaflLnFCGy69dckdUYIOKsGRy3qW8Zbu_RwAOGSXoxyJX776tCAZwx-9HVC6Q"/>
<!-- Vignette/Shadow Overlay for Realism -->
<div class="absolute inset-0 screen-overlay"></div>
<!-- Optional: Desktop UI Elements Overlay for added realism -->
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 opacity-60">
<div class="w-8 h-8 bg-white/10 rounded-md"></div>
<div class="w-8 h-8 bg-white/10 rounded-md"></div>
<div class="w-8 h-8 bg-white/10 rounded-md"></div>
</div>
</div>
</main>
<!-- END: Main Remote Viewport -->
<!-- BEGIN: Bottom Control Bar -->
<nav class="pb-8 w-full flex justify-center z-20" data-purpose="interaction-controls">
<div class="glass-panel px-8 py-3 rounded-2xl flex items-center gap-10 shadow-2xl">
<!-- Keyboard Action -->
<button class="flex flex-col items-center gap-1 group">
<div class="p-2 rounded-xl group-hover:bg-white/10 transition-colors">
<svg class="text-gray-300 group-active:scale-95 transition-transform" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><rect height="14" rx="2" width="20" x="2" y="5"></rect><line x1="6" x2="6" y1="9" y2="9"></line><line x1="10" x2="10" y1="9" y2="9"></line><line x1="14" x2="14" y1="9" y2="9"></line><line x1="18" x2="18" y1="9" y2="9"></line><line x1="6" x2="6" y1="13" y2="13"></line><line x1="10" x2="10" y1="13" y2="13"></line><line x1="14" x2="14" y1="13" y2="13"></line><line x1="18" x2="18" y1="13" y2="13"></line></svg>
</div>
<span class="text-[10px] font-semibold text-gray-500 uppercase tracking-tighter">Keyboard</span>
</button>
<!-- Quality Action -->
<button class="flex flex-col items-center gap-1 group">
<div class="p-2 rounded-xl group-hover:bg-white/10 transition-colors">
<svg class="text-brand-orange group-active:scale-95 transition-transform" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2v20"></path><path d="m4.93 4.93 14.14 14.14"></path><path d="M2 12h20"></path><path d="m19.07 4.93-14.14 14.14"></path></svg>
</div>
<span class="text-[10px] font-bold text-brand-orange uppercase tracking-tighter">High Quality</span>
</button>
<!-- Divider -->
<div class="w-px h-8 bg-white/10"></div>
<!-- Disconnect Button -->
<button class="flex flex-col items-center gap-1 group">
<div class="px-6 py-2 bg-gradient-to-br from-red-600 to-brand-orange rounded-xl shadow-lg shadow-red-900/20 group-hover:brightness-110 active:scale-95 transition-all">
<svg fill="none" height="24" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
</div>
<span class="text-[10px] font-bold text-red-500 uppercase tracking-tighter">Disconnect</span>
</button>
</div>
</nav>
<!-- END: Bottom Control Bar -->
<!-- BEGIN: Ambient Background Effects -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none -z-10">
<!-- Glow behind the screen -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80%] h-[60%] bg-brand-orange/5 blur-[120px] rounded-full"></div>
</div>
<!-- END: Ambient Background Effects -->
</body></html>
